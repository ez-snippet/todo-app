<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            display: none;
        }
        .add{
            width: 300px;
            height: 200px;
            background-color: black;
            color: white;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            border-radius: 10px;
            display: block;
        }
    </style>
</head>

<body>
     <button id="btn"> CLick and open model</button>
    <div class="box" id="box">
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Cumque ipsum quo corrupti doloremque, voluptatibus
            expedita perferendis provident. Rem sint voluptates possimus nulla exercitationem nesciunt amet neque at est
            vero. Atque?</p>
    </div>
    <script>
        let a = document.getElementById("box");
        let b = document.getElementById("btn");
        b.addEventListener("click", () => {
            a.classList.toggle("add");
        });
    </script>
</body>

</html>

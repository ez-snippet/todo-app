<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ali{
            width: 200px;
            height: 200px;
            background-color: green;
        }
        .red{
            width: 200px;
            height: 200px;
            background-color: red;
        }
        .dark{
            background-color: black;
        }
    </style>
</head>
<body>
    <div class="box">
        <button class="add"> Add color</button>
    </div>
    <div class="red"></div>
    <button class="remove"> Remove</button>
    <br>

    <button class="mode"> Dark Mode</button>

    <script>
        let box = document.getElementsByClassName("box")[0]
        let add = document.getElementsByClassName("add")[0]
        add.addEventListener("click", ()=>{
            box.classList.add("ali")
        })

        let red = document.getElementsByClassName("red")[0]
        let remove = document.getElementsByClassName("remove")[0]
        remove.addEventListener("click", ()=>{
            red.classList.remove("red")
        })

        let dark = document.getElementsByClassName("mode") [0]
        dark.addEventListener("click", ()=>{
            document.body.classList.toggle("dark")
        })

        
    </script>
</body>
</html>

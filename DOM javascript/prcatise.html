<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .dabba{
            width: 200px;

        }
        .back{

             width: 200px;
            height: 200px;

</head>
<body>
    <div id="box">
        <button id="btn"> One click</button>

    <button id="alert"> click me </button>
    <p  id="abdullah"> hello, html </p>
    <button id="key"> click </button>
    <script>
        let box = document.getElementById("box")

        let btn = document.getElementById("btn")

        btn.addEventListener("click", function(){
            
        box.classList.add("dabba"); 
        }  )
        btn.addEventListener("click", function(){
            
        box.classList.remove("back"); 
        }  )
       dark.addEventListener("click", function(){

    document.body.classList.add("dark")

    document.body.classList.remove("light") 
})

   light.addEventListener("click", function(){

   document.body.classList.add("light")

   document.body.classList.remove("dark") 
})
let mouse = document.getElementById("alert")

    alert("hello,developer 🟢")
})
let key = document.getElementById("key")

let abdullah =  document.getElementById("abdullah")

})
    </script>
</body>
